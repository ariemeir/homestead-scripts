esphome:
  name: office-signal
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
api:
ota:
logger:
output:
  - platform: gpio
    pin: GPIO3
    id: red_led_output
  - platform: gpio
    pin: GPIO4
    id: yellow_led_output
  - platform: gpio
    pin: GPIO5
    id: green_led_output
light:
  - platform: binary
    name: "Office Signal Red"
    output: red_led_output
  - platform: binary
    name: "Office Signal Yellow"
    output: yellow_led_output
  - platform: binary
    name: "Office Signal Green"
    output: green_led_output
